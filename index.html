<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Tracker</title>

<style>
:root {
  --bg:#0f172a;
  --card:#111827;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#38bdf8;
}

body {
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header {
  padding:1rem;
  text-align:center;
  font-size:1.4rem;
  font-weight:bold;
}

/* MAIN */
main {
  max-width:900px;
  margin:auto;
  padding:1rem;
}

/* LOGIN */
#loginScreen {
  position:fixed;
  inset:0;
  background:rgba(15,23,42,0.98);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
  z-index:9999;
}

/* INPUTS */
input, select, button {
  padding:.5rem;
  border-radius:8px;
  border:1px solid #1f2933;
  background:var(--card);
  color:var(--text);
}

button { cursor:pointer; }

/* ADD SECTION */
.add {
  display:flex;
  gap:10px;
  margin:1rem 0;
  flex-wrap:wrap;
}

/* TABS */
.tabs {
  display:flex;
  gap:.5rem;
  margin-bottom:1rem;
}

.tabs button {
  background:#1f2933;
  border:none;
  padding:.5rem 1rem;
  border-radius:8px;
}

.tabs button.active {
  background:var(--accent);
  color:#000;
  font-weight:bold;
}

/* SUMMARY */
.summary {
  display:flex;
  justify-content:space-around;
  background:#1f2933;
  padding:1rem;
  border-radius:12px;
  margin-bottom:1rem;
}

/* ===== CARD DESIGN (MAIN FIX) ===== */
#courses {
  display:flex;
  flex-direction:column;
  gap:14px;
}

.course {
  background:linear-gradient(145deg,#111827,#0b1220);
  border:1px solid #1f2933;
  border-radius:18px;
  padding:1rem;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

/* COURSE HEADER */
.course-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

/* TOPIC BOX */
.topic-box {
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid #1f2933;
}

/* SINGLE TOPIC ROW */
.topic-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 0;
}

/* BUTTON SMALL */
.small-btn {
  padding:2px 8px;
  font-size:12px;
  border-radius:6px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>Admin Login</h2>
  <input id="password" type="password" placeholder="Enter password">
  <button id="loginBtn">Login</button>
  <p id="error" style="color:red;"></p>
</div>

<header>📚 Course Tracker</header>

<main>

  <div class="add">
    <input id="courseName" placeholder="Course name">
    <select id="courseStatus">
      <option value="not-learned">Need to Learn</option>
      <option value="learning">Learning</option>
      <option value="learned">Learned</option>
    </select>
    <button id="addCourseBtn">Add</button>
  </div>

  <div class="tabs">
    <button data-tab="all" class="active">All</button>
    <button data-tab="learning">Learning</button>
    <button data-tab="not-learned">Need</button>
    <button data-tab="learned">Learned</button>
  </div>

  <div class="summary">
    <div>Total <span id="total">0</span></div>
    <div>Learned <span id="learnedCount">0</span></div>
    <div>Learning <span id="learningCount">0</span></div>
    <div>Need <span id="notCount">0</span></div>
  </div>

  <div id="courses"></div>

</main>

<script type="module" src="./app.js"></script>

</body>
</html>
