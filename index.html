<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Tracker</title>

<style>
:root {
  --bg:#0f172a; --card:#111827; --text:#e5e7eb; --muted:#9ca3af;
  --accent:#38bdf8; --learned:#22c55e; --learning:#facc15; --not:#ef4444;
}
body { margin:0; font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); }
header { padding:1rem; text-align:center; font-weight:bold; font-size:1.4rem; }
main { max-width:900px; margin:auto; padding:1rem; }

.add { display:flex; gap:.5rem; margin-bottom:1rem; }
input, select, button {
  background:var(--card);
  color:var(--text);
  border:1px solid #1f2933;
  padding:.5rem .6rem;
  border-radius:.5rem;
}

.course {
  background:var(--card);
  padding:1rem;
  border-radius:.75rem;
  margin-bottom:.75rem;
}

button { cursor:pointer; }

.tabs {
  display:flex;
  gap:.5rem;
  margin-bottom:1rem;
}

.tabs button {
  padding:.5rem 1rem;
  border:none;
  border-radius:.5rem;
  background:#1f2933;
  color:var(--text);
}

.tabs button.active {
  background:var(--accent);
  color:#111827;
  font-weight:bold;
}

.summary {
  background:#1f2933;
  padding:1rem;
  border-radius:.75rem;
  margin-bottom:1rem;
  display:flex;
  justify-content:space-around;
}
</style>
</head>

<body>

<header>📚 Course Tracker (Firebase)</header>

<main>

  <div class="add">
    <input id="courseName" placeholder="Course name">
    <select id="courseStatus">
      <option value="not-learned">Need to Learn</option>
      <option value="learning">Learning</option>
      <option value="learned">Learned</option>
    </select>
    <button id="addCourseBtn">Add</button>
  </div>

  <div class="tabs">
    <button data-tab="all" class="active">All</button>
    <button data-tab="learning">Learning</button>
    <button data-tab="not-learned">Need</button>
    <button data-tab="learned">Learned</button>
  </div>

  <div class="summary">
    <div>Total <span id="total">0</span></div>
    <div>Learned <span id="learnedCount">0</span></div>
    <div>Learning <span id="learningCount">0</span></div>
    <div>Need <span id="notCount">0</span></div>
  </div>

  <div id="courses"></div>

</main>

<script type="module" src="./app.js"></script>

</body>
</html>
