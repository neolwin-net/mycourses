<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love QR</title>

  <!-- Romantic Font -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: rgba(255, 255, 255, 0.6);
      font-size: 20px;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      padding: 50px 70px;
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      text-align: center;
      backdrop-filter: blur(10px);
      animation: fadeIn 0.8s ease;
    }

    .title {
      font-family: 'Great Vibes', cursive;
      font-size: 36px;
      color: #ff4d6d;
      margin-bottom: 10px;
    }

    .text {
      font-size: 38px;
      font-weight: 500;
      color: #333;
      margin-top: 10px;
      word-break: break-word;
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #999;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body>

  <!-- Floating hearts -->
  <div class="heart" style="left:10%">❤</div>
  <div class="heart" style="left:30%; animation-delay:2s;">❤</div>
  <div class="heart" style="left:50%; animation-delay:4s;">❤</div>
  <div class="heart" style="left:70%; animation-delay:1s;">❤</div>
  <div class="heart" style="left:90%; animation-delay:3s;">❤</div>

  <div class="card">
    <div class="title">💕 Love Message 💕</div>
    <div id="output" class="text">Loading...</div>
    <div class="footer">Made By LKA with ❤️</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const text = params.get("text");

    const output = document.getElementById("output");

    if (text) {
      output.innerText = text;
    } else {
      output.innerText = "SU NADI PHYO SITT ❤️";
    }
  </script>

</body>
</html>
